[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=30

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests (e.g., rate limiting)

asyncio_mode = auto
